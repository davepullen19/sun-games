
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seeds Prototype</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>SEEDS</h1>
      <p>Daily Puzzle Prototype</p>
    </div>

    <div class="goal">
      Goal: Make every node contain exactly <strong>3</strong> seeds in under 5 moves.
    </div>

    <div id="board" class="board"></div>

    <div class="controls">
      <div>Moves Left: <span id="moves">5</span></div>
      <button id="reset">Reset</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
